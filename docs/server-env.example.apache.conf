# Beispiel für globale Servervariablen in einer Apache-/Hosting-Konfiguration.
# Diese Vorlage ist bewusst ohne echte Zugangsdaten.
# Echte Werte nicht in die Projekt-.htaccess und nicht ins Git-Repository schreiben.

SetEnv APP_ENV "prod"
SetEnv APP_DEBUG "0"
SetEnv APP_SECRET "replace-with-long-random-secret"
SetEnv DATABASE_URL "mysql://DB_USER:DB_PASSWORD@DB_HOST:3306/DB_NAME?serverVersion=10.11.2-MariaDB&charset=utf8mb4"
SetEnv MESSENGER_TRANSPORT_DSN "doctrine://default?auto_setup=0"

SetEnv APP_ADMIN_PASSWORD_HASH "$2y$12$replace-with-real-bcrypt-hash"
SetEnv APP_IMPORT_API_TOKEN "replace-with-long-random-token"

SetEnv SHOPWARE_BASE_URL "https://sw.example.test"
SetEnv SHOPWARE_ADMIN_BASE_URL "https://sw.example.test"
SetEnv SHOPWARE_ADMIN_USERNAME "admin@example.invalid"
SetEnv SHOPWARE_ADMIN_PASSWORD "replace-with-shopware-admin-password"
SetEnv SHOPWARE_SYNC_CATEGORY "Amazon Imports"

SetEnv AMAZON_REGION "eu"
SetEnv AMAZON_SELLER_ID ""
SetEnv AMAZON_MARKETPLACE_ID ""
SetEnv AMAZON_APP_ID ""
SetEnv AMAZON_CLIENT_SECRET ""
SetEnv AMAZON_REFRESH_TOKEN ""
SetEnv AMAZON_ENABLE_LIVE_PUBLISH "0"

SetEnv JTL_API_BASE_URL ""
SetEnv JTL_AUTH_BASE_URL ""
SetEnv JTL_TENANT_ID ""
SetEnv JTL_CLIENT_ID ""
SetEnv JTL_CLIENT_SECRET ""
SetEnv JTL_ENABLE_LIVE_WRITEBACK "0"

SetEnv PLENTY_BASE_URL ""
SetEnv PLENTY_USERNAME ""
SetEnv PLENTY_PASSWORD ""
SetEnv PLENTY_DEFAULT_LANG "de"
SetEnv PLENTY_ENABLE_LIVE_WRITEBACK "0"

SetEnv SAP_R3_GATEWAY_URL ""
SetEnv SAP_R3_WRITEBACK_PATH "/ctc/material/writeback"
SetEnv SAP_R3_CLIENT ""
SetEnv SAP_R3_USERNAME ""
SetEnv SAP_R3_PASSWORD ""
SetEnv SAP_R3_SYSTEM_ID ""
SetEnv SAP_R3_LANGUAGE "DE"
SetEnv SAP_R3_ENABLE_LIVE_WRITEBACK "0"
